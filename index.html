<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plan Inspection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-left">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8" stroke="#60a5fa" stroke-width="2"/>
          <circle cx="10" cy="10" r="3" fill="#60a5fa"/>
        </svg>
        Plan Inspection
      </div>
    </div>

    <div class="header-center">
      <div class="mode-switcher">
        <button id="btn-bullage" class="mode-btn active">⊕ Bullage</button>
        <button id="btn-mesure" class="mode-btn">✓ Mesure</button>
      </div>
    </div>

    <div class="header-right">
      <label class="btn btn-upload" for="pdf-input">↑ Ouvrir PDF
        <input type="file" id="pdf-input" accept=".pdf" hidden>
      </label>
      <button id="btn-save-pdf" class="btn btn-save" disabled>💾 Sauvegarder PDF</button>
      <button id="btn-export-pdf" class="btn" disabled>⬇ Rapport PDF</button>
      <button id="btn-export-excel" class="btn" disabled>⬇ Excel</button>
    </div>
  </header>

  <main>
    <aside id="sidebar">
      <div id="empty-state" class="empty-state">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="margin-bottom:12px">
          <rect x="6" y="4" width="28" height="34" rx="3" stroke="#cbd5e1" stroke-width="2"/>
          <line x1="12" y1="14" x2="28" y2="14" stroke="#cbd5e1" stroke-width="1.5"/>
          <line x1="12" y1="19" x2="28" y2="19" stroke="#cbd5e1" stroke-width="1.5"/>
          <line x1="12" y1="24" x2="22" y2="24" stroke="#cbd5e1" stroke-width="1.5"/>
        </svg>
        <p>Ouvrez un PDF pour commencer</p>
      </div>

      <div id="bubble-list" class="bubble-list hidden"></div>

      <div id="sidebar-footer" class="sidebar-footer hidden">
        <span id="stat-total">0 cote</span>
        <span id="stat-ok" class="stat-ok">— OK</span>
        <span id="stat-nok" class="stat-nok">— NOK</span>
      </div>
    </aside>

    <div id="viewer">
      <div id="page-controls" class="page-controls hidden">
        <button id="btn-prev" disabled>◀</button>
        <span id="page-info">Page 1 / 1</span>
        <button id="btn-next" disabled>▶</button>
        <div class="zoom-controls">
          <button id="btn-zoom-out">−</button>
          <span id="zoom-level">150%</span>
          <button id="btn-zoom-in">+</button>
        </div>
      </div>

      <div id="canvas-wrapper">
        <div id="canvas-container">
          <canvas id="pdf-canvas"></canvas>
          <canvas id="annot-canvas"></canvas>
        </div>
      </div>

      <div id="drop-zone">
        <div class="drop-content">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="margin-bottom:16px">
            <rect x="8" y="4" width="32" height="40" rx="4" stroke="#94a3b8" stroke-width="2"/>
            <path d="M28 4v10h10" stroke="#94a3b8" stroke-width="2"/>
            <path d="M24 22v12M20 30l4 4 4-4" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <p>Glisser un PDF ici</p>
          <p class="drop-sub">ou utilisez le bouton <strong>Ouvrir PDF</strong></p>
        </div>
      </div>
    </div>
  </main>

  <!-- Popover création de bulle -->
  <div id="popover" class="popover hidden">
    <div class="popover-header">
      <span>Nouvelle bulle</span>
      <div id="popover-badge" class="bubble-badge-sm">1</div>
    </div>
    <div class="popover-body">
      <div class="field">
        <label>Désignation</label>
        <input type="text" id="inp-desig" placeholder="ex : Ø alésage A">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Nominale</label>
          <input type="number" id="inp-nominal" step="any" placeholder="0.000">
        </div>
        <div class="field">
          <label>Unité</label>
          <select id="inp-unit">
            <option value="mm">mm</option>
            <option value="°">°</option>
            <option value="N">N</option>
            <option value="">—</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Tol. +</label>
          <input type="number" id="inp-tol-plus" step="any" placeholder="0.000" min="0">
        </div>
        <div class="field">
          <label>Tol. −</label>
          <input type="number" id="inp-tol-minus" step="any" placeholder="0.000" min="0">
        </div>
      </div>
    </div>
    <div class="popover-footer">
      <button id="btn-cancel-bubble" class="btn-ghost">Annuler</button>
      <button id="btn-confirm-bubble" class="btn-primary">Valider →</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
